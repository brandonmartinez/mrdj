apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mrdj-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: security-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: mrdj.themartinez.cloud
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: mrdj-svc
                port:
                  name: 80-tcp
  tls:
    - secretName: mrdj-tls
      hosts:
        - mrdj.themartinez.cloud
