name: Squad Preview Validation

on:
  push:
    branches: [preview]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mrdj
          POSTGRES_PASSWORD: mrdj
          POSTGRES_DB: mrdj
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mrdj"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://mrdj:mrdj@localhost:5432/mrdj
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate version consistency
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if ! grep -q "## \[$VERSION\]" CHANGELOG.md 2>/dev/null; then
            echo "::error::Version $VERSION not found in CHANGELOG.md — update CHANGELOG.md before release"
            exit 1
          fi
          echo "✅ Version $VERSION validated in CHANGELOG.md"

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npm run db:migrate -w api

      - name: Seed baseline data
        run: npm run db:seed -w api
        env:
          SEED_ITUNES: "false"

      - name: Run API test suite
        run: npm run test -w api

      - name: Build api + web bundles
        run: npm run build

      - name: Check no .ai-team/ or .squad/ files are tracked
        run: |
          FOUND_FORBIDDEN=0
          if git ls-files --error-unmatch .ai-team/ 2>/dev/null; then
            echo "::error::❌ .ai-team/ files are tracked on preview — this must not ship."
            FOUND_FORBIDDEN=1
          fi
          if git ls-files --error-unmatch .squad/ 2>/dev/null; then
            echo "::error::❌ .squad/ files are tracked on preview — this must not ship."
            FOUND_FORBIDDEN=1
          fi
          if [ $FOUND_FORBIDDEN -eq 1 ]; then
            exit 1
          fi
          echo "✅ No .ai-team/ or .squad/ files tracked — clean for release."

      - name: Validate package.json version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ -z "$VERSION" ]; then
            echo "::error::❌ No version field found in package.json."
            exit 1
          fi
          echo "✅ package.json version: $VERSION"
