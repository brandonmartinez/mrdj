name: Squad CI

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mrdj
          POSTGRES_PASSWORD: mrdj
          POSTGRES_DB: mrdj
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mrdj"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://mrdj:mrdj@localhost:5432/mrdj
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npm run db:migrate -w api

      - name: Seed baseline data
        run: npm run db:seed -w api
        env:
          SEED_ITUNES: "false"

      - name: Run API test suite
        run: npm run test -w api

      - name: Build api + web bundles
        run: npm run build
